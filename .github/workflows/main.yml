name: Update Clash Config

on:
  schedule:
    # هر ۳۰ دقیقه یکبار (به وقت UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch:   # اجرای دستی هم امکان‌پذیر باشد

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pyyaml

      - name: Run converter
        run: python converter.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Tehronstore.yaml
          git diff --staged --quiet || git commit -m "Auto-update Clash config [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
